<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Sign Up | Kinetic Court</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet">
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .strength-bar {
      transition: width 0.3s ease-in-out;
    }
    .custom-radio:checked + label {
      background-color: #a3e635; /* primary-container */
      color: #416400; /* on-primary-container */
      border-color: #446900; /* primary */
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .loading-spinner {
      animation: spin 1s linear infinite;
    }
    .toast-enter {
      transform: translateY(100%);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast-active {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "inverse-primary": "#98da27",
            "on-primary": "#ffffff",
            "primary": "#446900",
            "on-tertiary-fixed": "#0b1c30",
            "background": "#f7f9fb",
            "error": "#ba1a1a",
            "surface-bright": "#f7f9fb",
            "surface-container-highest": "#e0e3e5",
            "tertiary": "#505f76",
            "on-secondary": "#ffffff",
            "on-primary-fixed": "#121f00",
            "tertiary-fixed-dim": "#b7c8e1",
            "on-surface": "#191c1e",
            "surface-container": "#eceef0",
            "surface-container-lowest": "#ffffff",
            "on-error-container": "#93000a",
            "on-secondary-container": "#5c647a",
            "surface-variant": "#e0e3e5",
            "surface-tint": "#446900",
            "primary-fixed": "#b2f746",
            "inverse-on-surface": "#eff1f3",
            "on-tertiary": "#ffffff",
            "outline-variant": "#c2cab0",
            "surface-container-high": "#e6e8ea",
            "primary-container": "#a3e635",
            "on-tertiary-container": "#4c5c72",
            "on-background": "#191c1e",
            "surface-container-low": "#f2f4f6",
            "on-secondary-fixed": "#131b2e",
            "secondary-fixed-dim": "#bec6e0",
            "primary-fixed-dim": "#98da27",
            "secondary-container": "#dae2fd",
            "tertiary-container": "#c3d4ee",
            "surface": "#f7f9fb",
            "on-surface-variant": "#424936",
            "surface-dim": "#d8dadc",
            "outline": "#727a64",
            "error-container": "#ffdad6",
            "tertiary-fixed": "#d3e4fe",
            "on-tertiary-fixed-variant": "#38485d",
            "on-error": "#ffffff",
            "on-primary-container": "#416400",
            "on-secondary-fixed-variant": "#3f465c",
            "secondary-fixed": "#dae2fd",
            "secondary": "#565e74",
            "on-primary-fixed-variant": "#334f00",
            "inverse-surface": "#2d3133"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "section-gap": "48px",
            "gutter": "16px",
            "container-padding": "24px",
            "base": "8px"
          },
          "fontFamily": {
            "body-lg": ["Inter"],
            "label-md": ["Inter"],
            "headline-md": ["Inter"],
            "label-sm": ["Inter"],
            "display-lg": ["Inter"],
            "headline-lg": ["Inter"],
            "headline-lg-mobile": ["Inter"],
            "body-md": ["Inter"]
          },
          "fontSize": {
            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
          }
        },
      },
    }
  </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<header class="w-full top-0 sticky z-50 bg-surface-container-lowest shadow-sm flex items-center justify-between px-gutter py-base max-w-7xl mx-auto">
<div class="flex items-center gap-2 font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight"><span class="material-symbols-outlined text-primary" data-icon="badminton" style="font-variation-settings: &quot;FILL&quot; 1;">badminton</span>
<span class="">Lin-Badminton</span></div>
</header>
<main class="flex-grow flex items-center justify-center p-gutter relative overflow-hidden">
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
<div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary-container via-transparent to-transparent"></div>
</div>
<div class="z-10 w-full max-w-lg">
<div class="bg-surface-container-lowest rounded-[32px] p-8 md:p-12 shadow-[0px_4px_20px_rgba(15,23,42,0.05)] border border-outline-variant">
<div class="mb-10 text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Join the Court</h1>
<p class="font-body-md text-on-surface-variant">Step into the future of badminton performance.</p>
</div>
<form class="space-y-6" id="signupForm">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="full-name">Full Name</label>
<input class="w-full px-4 py-3 rounded-xl border border-outline focus:ring-2 focus:ring-primary focus:border-primary bg-surface transition-all outline-none" id="full-name" name="name" placeholder="Enter your full name" required="" type="text">
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Address</label>
<input class="w-full px-4 py-3 rounded-xl border border-outline focus:ring-2 focus:ring-primary focus:border-primary bg-surface transition-all outline-none" id="email" name="email" placeholder="name@example.com" required="" type="email">
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Password</label>
<input class="w-full px-4 py-3 rounded-xl border border-outline focus:ring-2 focus:ring-primary focus:border-primary bg-surface transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password">
<div class="flex flex-col gap-1.5 mt-2">
<div class="h-1 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="strength-bar h-full bg-primary w-3/4"></div>
</div>
<span class="font-label-sm text-label-sm text-primary flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">shield</span>
                  Password Strength: Strong
                </span>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="confirm-password">Confirm Password</label>
<input class="w-full px-4 py-3 rounded-xl border border-outline focus:ring-2 focus:ring-primary focus:border-primary bg-surface transition-all outline-none" id="confirm-password" name="confirm_password" placeholder="••••••••" required="" type="password">
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block">Select Your Role</label>
<div class="grid grid-cols-2 gap-3">
<div class="relative">
<input checked="" class="hidden custom-radio" id="role-user" name="role" type="radio" value="student">
<label class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline cursor-pointer hover:bg-surface-container transition-all" for="role-user">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-label-sm text-label-sm">Student / User</span>
</label>
</div>
<div class="relative">
<input class="hidden custom-radio" id="role-coach" name="role" type="radio" value="coach">
<label class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline cursor-pointer hover:bg-surface-container transition-all" for="role-coach">
<span class="material-symbols-outlined mb-1">sports</span>
<span class="font-label-sm text-label-sm">Coach / Admin</span>
</label>
</div>
</div>
</div>
<button class="w-full bg-primary text-on-primary py-4 px-6 rounded-xl font-label-md text-label-md hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" id="submitBtn" type="submit">
<span id="btnText" class="">Create Account</span>
<div class="hidden" id="btnSpinner">
<span class="material-symbols-outlined loading-spinner">progress_activity</span>
</div>
</button>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant text-center">
<p class="font-body-md text-on-surface-variant">
            Already have an account? 
            <a class="text-primary font-bold hover:underline" href="#">Sign In</a>
</p>
</div>
</div>
</div>
</main>
<footer class="p-gutter text-center text-on-surface-variant">
<p class="font-label-sm text-label-sm">© 2024 Kinetic Court. Precision and Performance.</p>
</footer>
<div class="toast-enter fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] bg-inverse-surface text-inverse-on-surface px-6 py-4 rounded-2xl flex items-center gap-3 shadow-2xl pointer-events-none" id="toast">
<span class="material-symbols-outlined text-primary-fixed" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-body-md text-body-md">Account created successfully! Redirecting to login...</span>
</div>
<script>
    const signupForm = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const toast = document.getElementById('toast');

    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      // Loading State
      submitBtn.disabled = true;
      btnText.textContent = 'Processing...';
      btnSpinner.classList.remove('hidden');

      // Simulate API call
      setTimeout(() => {
        // Success Logic
        toast.classList.add('toast-active');
        
        // Reset button
        setTimeout(() => {
          btnText.textContent = 'Create Account';
          btnSpinner.classList.add('hidden');
          submitBtn.disabled = false;
        }, 2000);

        // Hide toast and redirect simulation
        setTimeout(() => {
          toast.classList.remove('toast-active');
        }, 4000);
      }, 1500);
    });

    // Password matching micro-interaction
    const pass = document.getElementById('password');
    const confirmPass = document.getElementById('confirm-password');
    
    confirmPass.addEventListener('input', () => {
      if (confirmPass.value && pass.value !== confirmPass.value) {
        confirmPass.classList.add('border-error');
        confirmPass.classList.remove('border-outline');
      } else {
        confirmPass.classList.remove('border-error');
        confirmPass.classList.add('border-outline');
      }
    });
  </script>


</body></html>
