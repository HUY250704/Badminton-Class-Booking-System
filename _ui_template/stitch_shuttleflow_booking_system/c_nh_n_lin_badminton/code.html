<script>
        // Simple micro-interaction for form inputs
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.color = '#446900';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.color = '';
            });
        });

        // Save button feedback
        const saveBtn = document.querySelector('button.bg-primary-container');
        saveBtn.addEventListener('click', () => {
            const originalText = saveBtn.innerText;
            saveBtn.innerText = 'Đang lưu...';
            saveBtn.style.opacity = '0.7';
            setTimeout(() => {
                saveBtn.innerText = 'Đã lưu thành công!';
                saveBtn.style.backgroundColor = '#446900';
                saveBtn.style.color = '#ffffff';
                setTimeout(() => {
                    saveBtn.innerText = originalText;
                    saveBtn.style.backgroundColor = '';
                    saveBtn.style.color = '';
                    saveBtn.style.opacity = '1';
                }, 2000);
            }, 800);
        });
    </script>
